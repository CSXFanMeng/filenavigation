name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis,msi
            rust-target: null
          - platform: macos-latest
            args: --target aarch64-apple-darwin --bundles dmg,app
            rust-target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin --bundles dmg,app
            rust-target: x86_64-apple-darwin
          - platform: ubuntu-latest
            args: --bundles deb,rpm,appimage
            rust-target: null

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cross-compilation target
        if: matrix.rust-target != null
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Read multilingual release notes
        id: release-notes
        shell: bash
        run: |
          {
            echo 'body<<FILENAVIGATION_RELEASE_NOTES'
            cat RELEASE_NOTES.md
            echo 'FILENAVIGATION_RELEASE_NOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Build and upload signed bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: FileNavigation v__VERSION__
          releaseBody: ${{ steps.release-notes.outputs.body }}
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
          releaseAssetNamePattern: FileNavigation_[version]_[platform]_[arch][setup].[ext]
          updaterJsonPreferNsis: true
          uploadUpdaterJson: true
          uploadUpdaterSignatures: true

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Publish completed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --draft=false --latest
