<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FileNavigation</title>
  </head>
  <body>
    <main id="app" class="shell">
      <section class="workspace">
        <aside class="sidebar">
          <div class="brand">
            <div class="brand-mark">FN</div>
            <div>
              <h1>FileNavigation</h1>
              <p>本地目录文件查找</p>
            </div>
          </div>

          <div class="field">
            <label for="root-path">搜索目录</label>
            <div class="path-row">
              <input id="root-path" type="text" placeholder="选择或输入目录路径" spellcheck="false" />
              <button id="pick-dir" class="icon-button" type="button" title="选择目录" aria-label="选择目录">
                <span aria-hidden="true">...</span>
              </button>
            </div>
          </div>

          <div class="field">
            <label for="query">文件名关键字</label>
            <input id="query" type="search" placeholder="例如 report、.rs、合同" autocomplete="off" />
          </div>

          <div class="controls">
            <label class="check-row">
              <input id="case-sensitive" type="checkbox" />
              <span>区分大小写</span>
            </label>
            <label class="check-row">
              <input id="include-hidden" type="checkbox" />
              <span>包含隐藏文件</span>
            </label>
          </div>

          <div class="field">
            <label for="max-results">最大结果数</label>
            <input id="max-results" type="number" min="10" max="5000" step="10" value="500" />
          </div>

          <button id="search" class="primary" type="button">开始查找</button>
        </aside>

        <section class="results-panel">
          <header class="topbar">
            <div>
              <p class="eyebrow">Search</p>
              <h2 id="status-title">等待搜索</h2>
            </div>
            <div class="stats">
              <div>
                <span id="stat-files">0</span>
                <small>扫描文件</small>
              </div>
              <div>
                <span id="stat-dirs">0</span>
                <small>扫描目录</small>
              </div>
              <div>
                <span id="stat-ms">0 ms</span>
                <small>耗时</small>
              </div>
            </div>
          </header>

          <div id="empty-state" class="empty-state">
            <div class="empty-symbol">⌕</div>
            <h3>输入目录和关键字后开始查找</h3>
            <p>搜索在本机完成，不上传文件名、路径或内容。</p>
          </div>

          <div id="result-list" class="result-list" aria-live="polite"></div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
