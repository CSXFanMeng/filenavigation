<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FileNavigation</title>
  </head>
  <body>
    <main id="app" class="shell">
      <section class="workspace">
        <aside class="sidebar">
          <div class="brand">
            <div class="brand-mark">FN</div>
            <div>
              <h1>FileNavigation</h1>
              <p data-i18n="brandSubtitle">Local directory file search</p>
            </div>
          </div>

          <div class="field">
            <label for="language" data-i18n="languageLabel">Language</label>
            <select id="language" aria-label="Language"></select>
          </div>

          <div class="field">
            <label for="root-path" data-i18n="rootLabel">Search folder</label>
            <div class="path-row">
              <input
                id="root-path"
                type="text"
                data-i18n-placeholder="rootPlaceholder"
                placeholder="Choose or enter a folder path"
                spellcheck="false"
              />
              <button
                id="pick-dir"
                class="icon-button"
                type="button"
                data-i18n-title="pickDirectory"
                data-i18n-aria-label="pickDirectory"
                title="Choose folder"
                aria-label="Choose folder"
              >
                <span aria-hidden="true">...</span>
              </button>
            </div>
          </div>

          <div class="field">
            <label for="query" data-i18n="queryLabel">File name keyword</label>
            <input
              id="query"
              type="search"
              data-i18n-placeholder="queryPlaceholder"
              placeholder="For example report, .rs, invoice"
              autocomplete="off"
            />
          </div>

          <div class="controls">
            <label class="check-row">
              <input id="case-sensitive" type="checkbox" />
              <span data-i18n="caseSensitive">Case sensitive</span>
            </label>
            <label class="check-row">
              <input id="include-hidden" type="checkbox" />
              <span data-i18n="includeHidden">Include hidden files</span>
            </label>
          </div>

          <div class="field">
            <label for="max-results" data-i18n="maxResults">Maximum results</label>
            <input id="max-results" type="number" min="10" max="5000" step="10" value="500" />
          </div>

          <button id="search" class="primary" type="button" data-i18n="searchButton">
            Search
          </button>
        </aside>

        <section class="results-panel">
          <header class="topbar">
            <div class="status-heading">
              <p class="eyebrow" data-i18n="eyebrow">Search</p>
              <h2 id="status-title" data-i18n="waiting">Ready to search</h2>
            </div>
            <div class="stats">
              <div>
                <span id="stat-files">0</span>
                <small data-i18n="statFiles">Files scanned</small>
              </div>
              <div>
                <span id="stat-dirs">0</span>
                <small data-i18n="statDirs">Folders scanned</small>
              </div>
              <div>
                <span id="stat-ms">0 ms</span>
                <small data-i18n="statTime">Time</small>
              </div>
            </div>
          </header>

          <div id="empty-state" class="empty-state">
            <div class="empty-symbol">⌕</div>
            <h3 data-i18n="emptyTitle">Enter a folder and keyword to begin</h3>
            <p data-i18n="emptyText">Search runs locally. File names, paths, and content are not uploaded.</p>
          </div>

          <div id="result-list" class="result-list" aria-live="polite"></div>
        </section>
      </section>
    </main>
    <script type="module" src="/src/app.js"></script>
  </body>
</html>
